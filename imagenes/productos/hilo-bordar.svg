<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#FDF4E3"/>
  <!-- Left loop of figure-8 skein -->
  <ellipse cx="158" cy="142" rx="68" ry="42" fill="#D4A853" opacity="0.12"/>
  <ellipse cx="158" cy="142" rx="68" ry="42" fill="none" stroke="#D4A853" stroke-width="2.5"/>
  <ellipse cx="158" cy="142" rx="68" ry="42" fill="none" stroke="#D4A853" stroke-width="1.3" opacity="0.45" transform="rotate(20,158,142)"/>
  <ellipse cx="158" cy="142" rx="68" ry="42" fill="none" stroke="#D4A853" stroke-width="1.3" opacity="0.45" transform="rotate(-20,158,142)"/>
  <ellipse cx="158" cy="142" rx="25" ry="14" fill="#FDF4E3" stroke="#D4A853" stroke-width="1.8"/>
  <!-- Right loop -->
  <ellipse cx="242" cy="142" rx="68" ry="42" fill="#D4A853" opacity="0.12"/>
  <ellipse cx="242" cy="142" rx="68" ry="42" fill="none" stroke="#D4A853" stroke-width="2.5"/>
  <ellipse cx="242" cy="142" rx="68" ry="42" fill="none" stroke="#C9785C" stroke-width="1.3" opacity="0.45" transform="rotate(20,242,142)"/>
  <ellipse cx="242" cy="142" rx="68" ry="42" fill="none" stroke="#C9785C" stroke-width="1.3" opacity="0.45" transform="rotate(-20,242,142)"/>
  <ellipse cx="242" cy="142" rx="25" ry="14" fill="#FDF4E3" stroke="#D4A853" stroke-width="1.8"/>
  <!-- Center binding -->
  <rect x="190" y="128" width="20" height="28" rx="5" fill="#D4A853" opacity="0.7"/>
  <!-- Label -->
  <text x="200" y="232" text-anchor="middle" font-family="Georgia,serif" font-size="14" fill="#8B6820" font-weight="700" letter-spacing="0.5">Hilo de Bordar 8m</text>
</svg>
