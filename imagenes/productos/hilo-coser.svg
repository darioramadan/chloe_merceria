<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#FDF4E3"/>
  <!-- Spool cylinder body -->
  <rect x="150" y="112" width="100" height="88" rx="4" fill="#D4A853" opacity="0.22"/>
  <rect x="150" y="112" width="100" height="88" rx="4" fill="none" stroke="#D4A853" stroke-width="2"/>
  <!-- Thread wound around spool -->
  <rect x="150" y="124" width="100" height="8" fill="#C9785C" opacity="0.55"/>
  <rect x="150" y="136" width="100" height="8" fill="#C9785C" opacity="0.45"/>
  <rect x="150" y="148" width="100" height="8" fill="#D4A853" opacity="0.7"/>
  <rect x="150" y="160" width="100" height="8" fill="#C9785C" opacity="0.55"/>
  <rect x="150" y="172" width="100" height="8" fill="#C9785C" opacity="0.45"/>
  <rect x="150" y="184" width="100" height="8" fill="#D4A853" opacity="0.7"/>
  <!-- Top flange ellipse -->
  <ellipse cx="200" cy="112" rx="50" ry="14" fill="#F5E8C8" stroke="#D4A853" stroke-width="2"/>
  <!-- Bottom flange ellipse -->
  <ellipse cx="200" cy="200" rx="50" ry="14" fill="#F5E8C8" stroke="#D4A853" stroke-width="2"/>
  <!-- Center hole -->
  <ellipse cx="200" cy="156" rx="12" ry="8" fill="#FDF4E3" stroke="#D4A853" stroke-width="1.5"/>
  <!-- Loose thread -->
  <path d="M250 155 C280 148 295 160 290 175" fill="none" stroke="#C9785C" stroke-width="2.2" stroke-linecap="round"/>
  <!-- Label -->
  <text x="200" y="264" text-anchor="middle" font-family="Georgia,serif" font-size="14" fill="#8B6820" font-weight="700" letter-spacing="0.5">Hilo de Coser Bobina</text>
</svg>
