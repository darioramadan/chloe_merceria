<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#F5E8EF"/>
  <!-- Ribbon roll cylinder body -->
  <ellipse cx="200" cy="110" rx="70" ry="20" fill="#F0C8D8" stroke="#C97C96" stroke-width="2"/>
  <rect x="130" y="110" width="140" height="85" fill="#E8A8C0" opacity="0.5"/>
  <rect x="130" y="110" width="140" height="85" fill="none" stroke="#C97C96" stroke-width="2"/>
  <!-- Grosgrain ribs on the roll -->
  <line x1="130" y1="120" x2="270" y2="120" stroke="#C97C96" stroke-width="1.5" opacity="0.5"/>
  <line x1="130" y1="128" x2="270" y2="128" stroke="#C97C96" stroke-width="1.5" opacity="0.5"/>
  <line x1="130" y1="136" x2="270" y2="136" stroke="#C97C96" stroke-width="1.5" opacity="0.5"/>
  <line x1="130" y1="144" x2="270" y2="144" stroke="#C97C96" stroke-width="1.5" opacity="0.5"/>
  <line x1="130" y1="152" x2="270" y2="152" stroke="#C97C96" stroke-width="1.5" opacity="0.5"/>
  <line x1="130" y1="160" x2="270" y2="160" stroke="#C97C96" stroke-width="1.5" opacity="0.5"/>
  <line x1="130" y1="168" x2="270" y2="168" stroke="#C97C96" stroke-width="1.5" opacity="0.5"/>
  <line x1="130" y1="176" x2="270" y2="176" stroke="#C97C96" stroke-width="1.5" opacity="0.5"/>
  <!-- Bottom ellipse cap -->
  <ellipse cx="200" cy="195" rx="70" ry="20" fill="#F0C8D8" stroke="#C97C96" stroke-width="2"/>
  <!-- Ribbon tail unrolling left -->
  <rect x="60" y="186" width="140" height="22" rx="3" fill="#E8A8C0" opacity="0.7" stroke="#C97C96" stroke-width="1.5"/>
  <line x1="60" y1="192" x2="200" y2="192" stroke="#C97C96" stroke-width="1" opacity="0.5"/>
  <line x1="60" y1="198" x2="200" y2="198" stroke="#C97C96" stroke-width="1" opacity="0.5"/>
  <line x1="60" y1="204" x2="200" y2="204" stroke="#C97C96" stroke-width="1" opacity="0.5"/>
  <!-- Label -->
  <text x="200" y="264" text-anchor="middle" font-family="Georgia,serif" font-size="14" fill="#8B4060" font-weight="700" letter-spacing="0.5">Cinta Grosgrain 3cm</text>
</svg>
