<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#EDE8E0"/>
  <!-- Tape measure case (round) -->
  <circle cx="200" cy="148" r="62" fill="#C8B090" stroke="#A08060" stroke-width="2.5"/>
  <circle cx="200" cy="148" r="50" fill="#D4BC9A" stroke="#A08060" stroke-width="1.5" opacity="0.7"/>
  <circle cx="200" cy="148" r="14" fill="#B89870" stroke="#8B7050" stroke-width="2"/>
  <!-- Lock button -->
  <rect x="226" y="136" width="18" height="24" rx="5" fill="#8B7050"/>
  <rect x="229" y="140" width="12" height="16" rx="3" fill="#A08060"/>
  <!-- Tape extending left -->
  <rect x="50" y="138" width="88" height="20" rx="3" fill="#F5E8C0" stroke="#A08060" stroke-width="1.5"/>
  <!-- Tape markings -->
  <line x1="60"  y1="138" x2="60"  y2="148" stroke="#A08060" stroke-width="1.5"/>
  <line x1="65"  y1="142" x2="65"  y2="150" stroke="#A08060" stroke-width="1"/>
  <line x1="70"  y1="138" x2="70"  y2="148" stroke="#A08060" stroke-width="1.5"/>
  <line x1="75"  y1="142" x2="75"  y2="150" stroke="#A08060" stroke-width="1"/>
  <line x1="80"  y1="138" x2="80"  y2="148" stroke="#A08060" stroke-width="1.5"/>
  <line x1="85"  y1="142" x2="85"  y2="150" stroke="#A08060" stroke-width="1"/>
  <line x1="90"  y1="138" x2="90"  y2="148" stroke="#A08060" stroke-width="1.5"/>
  <line x1="95"  y1="142" x2="95"  y2="150" stroke="#A08060" stroke-width="1"/>
  <line x1="100" y1="138" x2="100" y2="148" stroke="#A08060" stroke-width="1.5"/>
  <line x1="105" y1="142" x2="105" y2="150" stroke="#A08060" stroke-width="1"/>
  <line x1="110" y1="138" x2="110" y2="148" stroke="#A08060" stroke-width="1.5"/>
  <line x1="115" y1="142" x2="115" y2="150" stroke="#A08060" stroke-width="1"/>
  <line x1="120" y1="138" x2="120" y2="148" stroke="#A08060" stroke-width="1.5"/>
  <line x1="125" y1="142" x2="125" y2="150" stroke="#A08060" stroke-width="1"/>
  <line x1="130" y1="138" x2="130" y2="148" stroke="#A08060" stroke-width="1.5"/>
  <!-- Tape end hook -->
  <rect x="48" y="138" width="8" height="20" rx="2" fill="#A08060"/>
  <!-- Number marks -->
  <text x="60" y="157" font-family="Arial,sans-serif" font-size="7" fill="#5C4030">1</text>
  <text x="70" y="157" font-family="Arial,sans-serif" font-size="7" fill="#5C4030">2</text>
  <text x="80" y="157" font-family="Arial,sans-serif" font-size="7" fill="#5C4030">3</text>
  <text x="90" y="157" font-family="Arial,sans-serif" font-size="7" fill="#5C4030">4</text>
  <text x="100" y="157" font-family="Arial,sans-serif" font-size="7" fill="#5C4030">5</text>
  <!-- Case highlight -->
  <path d="M168 110 Q200 102 232 112" fill="none" stroke="white" stroke-width="2.5" opacity="0.45"/>
  <!-- Label -->
  <text x="200" y="264" text-anchor="middle" font-family="Georgia,serif" font-size="14" fill="#5C4030" font-weight="700" letter-spacing="0.5">Centímetro Retráctil</text>
</svg>
